unbind r
bind r source-file ~/.tmux.conf

set -g default-terminal "tmux-256color"
set -g prefix C-f
set -g mouse on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g focus-events on
set-option -g status-position top

# Ensure GUI/session environment is propagated into new panes
# so that tools like markdown-preview can spawn graphical browsers.
set-option -ga update-environment " XDG_SESSION_TYPE"
set-option -ga update-environment " XDG_CURRENT_DESKTOP"
set-option -ga update-environment " XDG_SESSION_ID"
set-option -ga update-environment " XAUTHORITY"
set-option -ga update-environment " DBUS_SESSION_BUS_ADDRESS"
set-option -ga update-environment " SSH_AUTH_SOCK"
set-option -ga update-environment " BROWSER"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'spywhere/tmux-named-snapshot'
set -g @plugin 'tmux-plugins/tmux-cpu'

# configure resurrect & continuum
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Manual save/restore keybindings (set by tmux-resurrect):
# prefix + Ctrl-s - save session
# prefix + Ctrl-r - restore session

# set colour theme
set -g @catppuccin_flavour "macchiato"
set -g @catppuccin_window_status_style "slanted"

# Show window name (instead of running program) after window number
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Keep window names user-controlled (don't auto-rename to running program)
set -g automatic-rename off
set -g allow-rename off

# Enable transparent background
set -ag terminal-overrides ",xterm-256color:RGB"
set -g @catppuccin_status_background "default"
set -g status-bg default
set -g window-style "bg=default"
set -g window-active-style "bg=default"

# Status line options
set -g @catppuccin_status_left_separator "█"

set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_cpu}"

# Display pop-ups
bind t display-popup -w 80% -h 80% -d "#{pane_current_path}" "zsh"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
